<div hx-swap-oob="true" id="popup-overlay" class="popup-overlay">
    <div id="popup" class="popup settings-new-model gap-24">
        <div class="popup-header">
            <h2>Настройки нового исследования</h2>
            <p>Настройте новое исследование</p>
        </div>
        <form class="column gap-24" hx-post="{{ url_for('api_edit_new_research') }}" hx-trigger="submit" hx-swap="none"
            autocomplete="off">
            <input type="hidden" name="previous_screen" value="{{ previous_screen }}">
            <div class="block">
                <h2>Модели</h2>
                <div class="field">
                    <select name="model_answer" class="input">
                        {% for model in generative_models %}
                        <option value="{{ model.model_id }}" {% if model_answer and model.model_id==model_answer
                            %}selected{% endif %}>
                            {{ model.model_name }}
                        </option>
                        {% endfor %}
                    </select>
                    <label>Модель генерации ответа</label>
                </div>
                <div class="field">
                    <select name="model_search" class="input">
                        {% for model in generative_models %}
                        <option value="{{ model.model_id }}" {% if model_search and model.model_id==model_search
                            %}selected{% endif %}>
                            {{ model.model_name }}
                        </option>
                        {% endfor %}
                    </select>
                    <label>Модель поиска информации</label>
                </div>
                <div class="field">
                    <select name="model_direction" class="input">
                        {% for model in generative_models %}
                        <option value="{{ model.model_id }}" {% if model_direction and model.model_id==model_direction
                            %}selected{% endif %}>
                            {{ model.model_name }}
                        </option>
                        {% endfor %}
                    </select>
                    <label>Модель направления исследования</label>
                </div>
                <div class="field">
                    <select name="model_embed" class="input">
                        {% for model in embedding_models %}
                        <option value="{{ model.model_id }}" {% if model_embed and model.model_id==model_embed
                            %}selected{% endif %}>
                            {{ model.model_name }}
                        </option>
                        {% endfor %}
                    </select>
                    <label>Модель эмбединга</label>
                </div>
            </div>
            <div class="block">
                <h2>Наследование</h2>
                <div class="field">
                    <select name="model_parent" class="input">
                        <!-- builder -->
                        <option value="none" {% if not model_parent or model_parent=="none" %}selected{% endif %}>
                            Не наследовать
                        </option>
                    </select>
                    <label>Предыдущее исследование</label>
                </div>
            </div>
            <div class="buttons column gap-12">
                <button class="primary solid">
                    Сохранить настройки
                </button>
                <a href="#"
                    hx-get="{{ url_for('new_research') if previous_screen == 'edit_new_research' else url_for('hide') }}"
                    hx-vals='{"reset": "true", "previous_screen": "{{ previous_screen or "" }}"}'
                    hx-swap="none"
                    class="button warning stroke col-max">
                    Сбросить и сохранить
                </a>
            </div>
        </form>
        {% include 'includes/popup_close.html' %}
    </div>
</div>
<a hx-swap-oob="outerHTML" id="new-research-settings-btn" href="#" hx-swap="none" hx-trigger="click"
    hx-get="{{ url_for('edit_new_research') }}" hx-vals='{"previous_screen": "{{ previous_screen }}"}'
    class="button border-icon{% if has_settings %} active{% endif %}">
    {% set width = 24 %}
    {% set height = 24 %}
    {% set class = "color-white-default" %}
    {% include 'includes/svg/settings.svg' %}
</a>
