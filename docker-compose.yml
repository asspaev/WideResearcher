services:
  app:
    build: .
    container_name: wideresearcher-application
    restart: always
    ports:
      - "${DOCKER_APP_PORT}:8000"
    networks:
      - wideresearcher-network
    volumes:
      - ./app:/workdir/app
      - ./.env:/workdir/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7.2
    container_name: wideresearcher-redis
    restart: always
    ports:
      - "${DOCKER_REDIS_PORT}:6379"
    networks:
      - wideresearcher-network
    command: ["redis-server", "--requirepass", "${REDIS__PASSWORD}"]

  postgres:
    image: postgres:18
    container_name: wideresearcher-postgres
    restart: always
    environment:
      POSTGRES_DB: ${SQL__DATABASE}
      POSTGRES_USER: ${SQL__USER}
      POSTGRES_PASSWORD: ${SQL__PASSWORD}
    ports:
      - "${DOCKER_SQL_PORT}:5432"
    volumes:
      - wideresearcher-data:/var/lib/postgresql/data
    networks:
      - wideresearcher-network

  searxng:
    image: searxng/searxng:latest
    container_name: wideresearcher-searxng
    restart: always
    ports:
      - "${DOCKER_SEARXNG_PORT}:8080"
    environment:
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY}
    networks:
      - wideresearcher-network
    volumes:
      - ./searxng:/etc/searxng:rw

  celery-worker:
    build: .
    container_name: wideresearcher-celery-worker
    restart: always
    command: ["celery", "-A", "app.core.celery:celery_app", "worker", "--loglevel=info"]
    networks:
      - wideresearcher-network
    volumes:
      - ./app:/workdir/app
      - ./.env:/workdir/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - postgres
      - searxng

  celery-beat:
    build: .
    container_name: wideresearcher-celery-beat
    restart: always
    command: ["celery", "-A", "app.core.celery:celery_app", "beat", "--loglevel=info"]
    networks:
      - wideresearcher-network
    volumes:
      - ./app:/workdir/app
      - ./.env:/workdir/.env
    depends_on:
      - redis
      - celery-worker

networks:
  wideresearcher-network:

volumes:
  wideresearcher-data: